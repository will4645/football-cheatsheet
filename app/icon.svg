<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#080c14"/>
  <!-- C arc: open to the upper-right, matching the logo -->
  <path d="M 69 28 A 26 26 0 1 0 69 72"
        stroke="url(#g)" stroke-width="9" fill="none"
        stroke-linecap="round"/>
  <!-- Bar chart: 3 ascending bars centred inside the C -->
  <rect x="34" y="60" width="8" height="14" rx="2.5" fill="url(#g)"/>
  <rect x="46" y="50" width="8" height="24" rx="2.5" fill="url(#g)"/>
  <rect x="58" y="40" width="8" height="34" rx="2.5" fill="url(#g)"/>
</svg>
