<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320">
  <defs>
    <linearGradient id="g" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <filter id="icon-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur-outer"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="blur-inner"/>
      <feMerge>
        <feMergeNode in="blur-outer"/>
        <feMergeNode in="blur-outer"/>
        <feMergeNode in="blur-inner"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="tag-glow" x="-40%" y="-120%" width="180%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon: C-arc + ascending bars, centre (300,118), radius 62 -->
  <!-- Same proportions as logo.svg scaled ~1.77x -->
  <g filter="url(#icon-glow)">
    <path d="M 344 74 A 62 62 0 1 0 344 162"
          stroke="url(#g)" stroke-width="16" fill="none" stroke-linecap="round"/>
    <!-- Left bar (shortest) -->
    <rect x="272" y="131" width="16" height="30" rx="3.5" fill="url(#g)"/>
    <!-- Middle bar -->
    <rect x="291" y="115" width="16" height="46" rx="3.5" fill="url(#g)"/>
    <!-- Right bar (tallest) -->
    <rect x="311" y="99" width="16" height="62" rx="3.5" fill="url(#g)"/>
  </g>

  <!-- CHEAT SHEETS -->
  <text x="300" y="242"
        text-anchor="middle"
        font-family="'Arial Black', Impact, 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="52"
        letter-spacing="9"
        fill="white">CHEAT SHEETS</text>

  <!-- KNOW THE GAME. -->
  <g filter="url(#tag-glow)">
    <text x="300" y="278"
          text-anchor="middle"
          font-family="'Arial', 'Helvetica Neue', sans-serif"
          font-weight="700"
          font-size="17"
          letter-spacing="8"
          fill="#4ade80">KNOW THE GAME.</text>
  </g>
</svg>
