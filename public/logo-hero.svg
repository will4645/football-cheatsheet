<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320">
  <defs>
    <linearGradient id="g" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <!-- Double-layer glow for icon -->
    <filter id="icon-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur-outer"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="blur-inner"/>
      <feMerge>
        <feMergeNode in="blur-outer"/>
        <feMergeNode in="blur-outer"/>
        <feMergeNode in="blur-inner"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow for green tagline -->
    <filter id="tag-glow" x="-40%" y="-120%" width="180%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Icon: C-arc + ascending bars ───────────────────────────────── -->
  <!-- Circle centre (300, 118), radius 62. Arc opens to the upper-right. -->
  <g filter="url(#icon-glow)">
    <path d="M 340 71 A 62 62 0 1 0 340 165"
          stroke="url(#g)" stroke-width="13" fill="none" stroke-linecap="round"/>
    <!-- Left bar (shortest) -->
    <rect x="263" y="137" width="13" height="28" rx="3.5" fill="url(#g)"/>
    <!-- Middle bar -->
    <rect x="280" y="123" width="13" height="42" rx="3.5" fill="url(#g)"/>
    <!-- Right bar (tallest) -->
    <rect x="297" y="107" width="13" height="58" rx="3.5" fill="url(#g)"/>
  </g>

  <!-- ── CHEAT SHEETS ─────────────────────────────────────────────────── -->
  <text x="300" y="242"
        text-anchor="middle"
        font-family="'Arial Black', Impact, 'Helvetica Neue', sans-serif"
        font-weight="900"
        font-size="52"
        letter-spacing="9"
        fill="white">CHEAT SHEETS</text>

  <!-- ── KNOW THE GAME. ──────────────────────────────────────────────── -->
  <g filter="url(#tag-glow)">
    <text x="300" y="278"
          text-anchor="middle"
          font-family="'Arial', 'Helvetica Neue', sans-serif"
          font-weight="700"
          font-size="17"
          letter-spacing="8"
          fill="#4ade80">KNOW THE GAME.</text>
  </g>
</svg>
